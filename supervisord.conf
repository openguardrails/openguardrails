[supervisord]
nodaemon=true
logfile=/mnt/data/openguardrails-data/logs/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/mnt/data/openguardrails-data/logs

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10
stdout_logfile=/mnt/data/openguardrails-data/logs/nginx.log
stderr_logfile=/mnt/data/openguardrails-data/logs/nginx_error.log
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile_backups=5

# Unified backend (Phase 3 step 6+):
# Single FastAPI app exposing admin (/api/v1), detection (/v1/guardrails*),
# proxy (/v1/chat/completions etc.), and gateway (/v1/gateway/*) on one port.
# Runs migrations once before forking uvicorn workers; SERVICE_NAME=admin
# preserves the legacy supervisor-entrypoint behavior for any legacy code
# that still keys off it.
[program:unified-service]
command=/app/supervisor-entrypoint.sh python3 start.py
directory=/app
autostart=true
autorestart=true
priority=20
environment=SERVICE_NAME="admin"
stdout_logfile=/mnt/data/openguardrails-data/logs/unified.log
stderr_logfile=/mnt/data/openguardrails-data/logs/unified_error.log
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile_backups=5
