name: Publish PyPI package

on:
  push:
    tags:
      - "python-v*"
      - "gateway-v*"
      - "hermes-v*"
      - "langgraph-v*"

permissions:
  contents: read

jobs:
  build:
    name: Build Python package
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.package.outputs.package_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve package and validate version
        id: package
        shell: bash
        run: |
          case "$GITHUB_REF_NAME" in
            python-v*)    directory="packages/python"; prefix="python-v" ;;
            gateway-v*)   directory="services/gateway"; prefix="gateway-v" ;;
            hermes-v*)    directory="integrations/hermes"; prefix="hermes-v" ;;
            langgraph-v*) directory="integrations/langgraph"; prefix="langgraph-v" ;;
            *) echo "::error::Unsupported release tag: $GITHUB_REF_NAME"; exit 1 ;;
          esac

          tag_version="${GITHUB_REF_NAME#"$prefix"}"
          package_version="$(python -c 'import sys, tomllib; print(tomllib.load(open(sys.argv[1], "rb"))["project"]["version"])' "$directory/pyproject.toml")"
          package_name="$(python -c 'import sys, tomllib; print(tomllib.load(open(sys.argv[1], "rb"))["project"]["name"])' "$directory/pyproject.toml")"

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "::error::Tag version $tag_version does not match $package_name==$package_version"
            exit 1
          fi

          echo "directory=$directory" >> "$GITHUB_OUTPUT"
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build wheel and source distribution
        run: python -m build "${{ steps.package.outputs.directory }}" --outdir dist

      - name: Validate distributions
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish ${{ needs.build.outputs.package_name }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/${{ needs.build.outputs.package_name }}/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
