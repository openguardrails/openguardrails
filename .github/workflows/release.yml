name: Release

on:
  push:
    branches: [main]
    paths: ['VERSION']

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Bump versions, tag, and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read VERSION
        id: ver
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "Tag v${{ steps.ver.outputs.version }} already exists, skipping."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Update package.json versions
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          npm pkg set version="$VERSION" --prefix moltguard

      - name: Update moltguard skill versions
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          # Update openclaw.plugin.json
          jq --arg v "$VERSION" '.version = $v' moltguard/openclaw.plugin.json > tmp.json && mv tmp.json moltguard/openclaw.plugin.json
          # Update SKILL.md frontmatter version
          sed -i "s/^version: .*/version: $VERSION/" moltguard/clawhub-skill/SKILL.md

      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add moltguard/package.json moltguard/openclaw.plugin.json moltguard/clawhub-skill/SKILL.md
          git diff --staged --quiet || git commit -m "chore: bump package versions to ${{ steps.ver.outputs.version }}"
          git push

      - name: Create and push tag
        run: |
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"

      # ─── Publish @openguardrails/moltguard ────────────────────────
      - name: Build Gateway
        working-directory: gateway
        run: |
          npm install
          npm run build

      - name: Bundle Gateway into MoltGuard
        run: |
          rm -rf moltguard/gateway
          mkdir -p moltguard/gateway/handlers
          cp gateway/dist/*.js gateway/dist/*.d.ts gateway/dist/*.map moltguard/gateway/
          cp gateway/dist/handlers/*.js gateway/dist/handlers/*.d.ts gateway/dist/handlers/*.map moltguard/gateway/handlers/

      - name: Build Dashboard
        working-directory: dashboard
        run: |
          pnpm install
          pnpm build
          cd apps/api && pnpm bundle

      - name: Bundle Dashboard into MoltGuard
        run: |
          mkdir -p moltguard/dashboard-dist/api
          mkdir -p moltguard/dashboard-dist/web
          cp -r dashboard/apps/api/bundle/* moltguard/dashboard-dist/api/
          cp -r dashboard/apps/web/out/* moltguard/dashboard-dist/web/

      - name: Build and publish moltguard
        working-directory: moltguard
        run: |
          npm install
          npm run build
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ─── Summary ──────────────────────────────────────────────────
      - name: Release summary
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          echo "## Released v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`@openguardrails/moltguard\` | ${VERSION} |" >> $GITHUB_STEP_SUMMARY
