# In-the-wild prompt-injection payloads that target OpenClaw agents. Issue
# #30448 tracks these being seeded in Reddit/Discord/docs content so the
# agent pulls them via web_fetch and treats the fake System: block as
# authoritative.

- id: OGR-OC-PI-001
  category: malicious-skill
  severity: high
  title: "Fake Post-Compaction Audit system message"
  description: >-
    Canary from openclaw/openclaw#30448. Attacker spoofs an OpenClaw-style
    "System: [timestamp] Post-Compaction Audit" banner to coerce the agent
    into reading WORKFLOW_AUTO.md and date-stamped memory files that only
    exist if the injection is honored.
  patterns:
    - "System:\\s+\\[timestamp\\][^\\n]{0,120}Post-Compaction Audit"
    - "WORKFLOW_AUTO\\.md"
    - "memory/\\\\d\\{4\\}-\\\\d\\{2\\}-\\\\d\\{2\\}\\\\\\.md"
  references:
    - "https://github.com/openclaw/openclaw/issues/30448"
  remediation: >-
    Strip the content before it reaches the agent, or treat any non-session
    "System:" block in untrusted input as attacker-controlled.

- id: OGR-OC-PI-002
  category: malicious-skill
  severity: medium
  title: "Injected [System Message] block in channel text (#30111)"
  description: >-
    Reported pattern: attacker pastes a [System Message] or [System] block
    into a chat message. OpenClaw's structural mitigation request is tracked
    in #30111; until deployed, signatures catch the raw text form.
  patterns:
    - "\\[System(?:\\s+Message)?\\][^\\n]{0,200}(?:ignore|disregard|override|you are now)"
  references:
    - "https://github.com/openclaw/openclaw/issues/30111"
  remediation: >-
    Reject or quote-wrap inbound messages that contain [System] banners
    before they reach the model.
