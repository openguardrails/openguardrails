# Malicious ClawHub skill IoCs — all entries are backed by public threat-intel
# reporting on the ClawHavoc campaign (~341 malicious skills traced by Koi
# Security, Bitdefender, Trend Micro, and Antiy CERT during Feb 2026).
#
# References consolidated:
#   - https://thehackernews.com/2026/02/researchers-find-341-malicious-clawhub.html
#   - https://www.trendmicro.com/en_us/research/26/b/openclaw-skills-used-to-distribute-atomic-macos-stealer.html
#   - https://www.esecurityplanet.com/threats/hundreds-of-malicious-skills-found-in-openclaws-clawhub/

- id: OGR-OC-SKILL-001
  category: malicious-skill
  severity: critical
  title: "ClawHavoc AMOS stealer C2 IP in skill payload"
  description: >-
    The ClawHavoc campaign's base64 payload decodes to a curl that pulls a
    second stage from 91.92.242.30, a Bulgarian-range host flagged as AMOS
    info-stealer infrastructure.
  patterns:
    - "91\\.92\\.242\\.30"
  references:
    - "https://thehackernews.com/2026/02/researchers-find-341-malicious-clawhub.html"
    - "https://www.trendmicro.com/en_us/research/26/b/openclaw-skills-used-to-distribute-atomic-macos-stealer.html"
  remediation: >-
    Delete the skill directory. Rotate every credential accessible from the
    gateway host, then audit network egress logs for prior calls to this IP.

- id: OGR-OC-SKILL-002
  category: malicious-skill
  severity: high
  title: "Skill exfiltrates OpenClaw bot credentials from ~/.clawdbot/.env"
  description: >-
    Multiple ClawHavoc skills read ~/.clawdbot/.env and POST it to an attacker
    webhook. Legitimate skills do not need to read the daemon credentials file.
  patterns:
    - "(?:\\$\\{?HOME\\}?|~)/\\.clawdbot/\\.env"
    - "\\.clawdbot/\\.env[^\\n]{0,200}(?:curl|wget|fetch|requests\\.post|axios\\.post|webhook)"
  exclude_patterns:
    - "openclaw\\s+doctor"
  references:
    - "https://blog.cyberdesserts.com/openclaw-malicious-skills-security/"
    - "https://www.esecurityplanet.com/threats/hundreds-of-malicious-skills-found-in-openclaws-clawhub/"
  remediation: >-
    Remove the skill, rotate the OpenClaw bot token, and review the daemon
    credentials file for further tampering.

- id: OGR-OC-SKILL-003
  category: malicious-skill
  severity: high
  title: "Typosquatted ClawHub author aslaep123 (impersonates asleep123)"
  description: >-
    Bitdefender traced 200+ ClawHub skills to the handle "aslaep123",
    mimicking the legitimate author "asleep123" in order to capture
    accidental installs.
  patterns:
    - "(?:author|publisher|owner|maintainer)[\"']?\\s*[:=]\\s*[\"']aslaep123[\"']"
    - "clawhub\\.com/u/aslaep123"
  references:
    - "https://thehackernews.com/2026/02/researchers-find-341-malicious-clawhub.html"
  remediation: >-
    Uninstall every skill published under this handle and block the author
    slug in your ClawHub sync config.

- id: OGR-OC-SKILL-004
  category: malicious-skill
  severity: high
  title: "Skill ships base64 blob piped into a shell"
  description: >-
    ClawHavoc skills hide their loader as `echo <base64> | base64 -d | sh`.
    Legitimate skills do not need to shell-execute decoded base64.
  patterns:
    - "echo\\s+[A-Za-z0-9+/=]{80,}\\s*\\|\\s*base64\\s*(?:--decode|-d|-D|-di)\\s*\\|\\s*(?:sh|bash|zsh)"
    - "base64\\s*(?:--decode|-d|-D|-di)[^\\n]{0,60}\\|\\s*(?:sh|bash|zsh)"
  references:
    - "https://www.esecurityplanet.com/threats/hundreds-of-malicious-skills-found-in-openclaws-clawhub/"
  remediation: >-
    Treat the skill as compromised. Remove it, decode the blob in a sandbox
    to confirm payload, and audit any credentials the skill could reach.

- id: OGR-OC-SKILL-005
  category: malicious-skill
  severity: medium
  title: "Skill posts to Discord webhook — known ClawHavoc exfil channel"
  description: >-
    Discord webhooks are the primary exfil sink documented for the ClawHavoc
    campaign. A skill emitting to discord.com/api/webhooks needs a clear
    justification in its README; otherwise assume exfil.
  patterns:
    - "discord(?:app)?\\.com/api/webhooks/\\d+/[A-Za-z0-9_-]+"
  references:
    - "https://blog.cyberdesserts.com/openclaw-malicious-skills-security/"
  remediation: >-
    Confirm the webhook URL is documented and owner-controlled. If not,
    remove the skill.
