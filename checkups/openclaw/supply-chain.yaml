# Supply-chain posture for skills and plugins pulled from ClawHub, plus
# workspace-level overrides that upstream advisories flagged as trust-root
# escapes.

- id: OGR-OC-SC-001
  category: vulnerable-plugin
  severity: high
  title: "ClawHub skill pinned without integrity hash (GHSA-3vvq-q2qc-7rmp)"
  description: >-
    GHSA-3vvq-q2qc-7rmp ("B-M3") flagged that ClawHub downloads did not
    enforce integrity verification. Any skill reference that names a version
    without a sha256/integrity field is trusting the registry end-to-end.
  patterns:
    - "\"registry\"\\s*:\\s*\"clawhub\"[^}]{0,200}\"version\"\\s*:\\s*\"[^\"]+\"(?![^}]{0,200}\"(?:integrity|sha256|hash)\")"
  references:
    - "https://github.com/openclaw/openclaw/security/advisories/GHSA-3vvq-q2qc-7rmp"
  remediation: >-
    Upgrade OpenClaw and re-pin each ClawHub skill with an integrity hash.
    Prefer `clawhub install <skill> --frozen` or a committed lockfile.

- id: OGR-OC-SC-002
  category: dangerous-config
  severity: high
  title: "Workspace .env overrides OpenClaw hook root (GHSA-3qpv-xf3v-mm45)"
  description: >-
    A workspace-local .env that sets OPENCLAW_HOOKS_ROOT (or the bundled
    plugin trust root per GHSA-qcj9) loads attacker-controlled hook code
    from outside the sanctioned directory.
  patterns:
    - "^\\s*OPENCLAW_HOOKS_ROOT\\s*="
    - "^\\s*OPENCLAW_BUNDLED_PLUGINS_ROOT\\s*="
    - "^\\s*OPENCLAW_PLUGIN_TRUST_ROOT\\s*="
  references:
    - "https://github.com/openclaw/openclaw/security/advisories/GHSA-3qpv-xf3v-mm45"
    - "https://github.com/openclaw/openclaw/security/advisories/GHSA-qcj9-wwgw-6gm8"
    - "https://github.com/openclaw/openclaw/security/advisories/GHSA-7wv4-cc7p-jhxc"
  remediation: >-
    Remove these overrides from the workspace .env. Upgrade OpenClaw; the
    fix blocks workspace-level overrides of trust roots.
