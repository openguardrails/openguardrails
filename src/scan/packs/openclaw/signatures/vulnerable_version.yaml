# Version-pin signatures for published OpenClaw advisories. These fire on
# package.json / lockfile style evidence — cheap, offline, and precise
# enough when the manifest pins a vulnerable range.

- id: OGR-OC-VULN-001
  category: vulnerable-plugin
  severity: critical
  title: "OpenClaw <= 2026.1.28 vulnerable to 1-click RCE via gatewayUrl (CVE-2026-25253)"
  description: >-
    GHSA-g8p2-7wf7-98mq / CVE-2026-25253. The Control UI did not validate
    the gatewayUrl query parameter and auto-connected, letting a crafted
    link exfiltrate the gateway auth token. Fixed in 2026.1.29.
  patterns:
    - "\"openclaw\"\\s*:\\s*\"(?:\\^|~|=)?2026\\.1\\.(?:[0-9]|1[0-9]|2[0-8])\""
    - "\"clawdbot\"\\s*:\\s*\"(?:\\^|~|=)?2026\\.1\\.(?:[0-9]|1[0-9]|2[0-8])\""
  references:
    - "https://github.com/openclaw/openclaw/security/advisories/GHSA-g8p2-7wf7-98mq"
    - "https://thehackernews.com/2026/02/openclaw-bug-enables-one-click-remote.html"
  remediation: >-
    Upgrade to openclaw >= 2026.1.29, rotate gateway.auth.token, and revoke
    any device tokens that may have been exfiltrated.

- id: OGR-OC-VULN-002
  category: vulnerable-plugin
  severity: critical
  title: "OpenClaw < 2026.3.11 vulnerable to device.token.rotate scope uplift (CVE-2026-32922)"
  description: >-
    GHSA-whf9-3hcx-gq54 / CVE-2026-32922, CVSS 9.9. Any caller holding
    operator.pairing could mint tokens with operator.admin scope via
    device.token.rotate, leading to gateway-level RCE.
  patterns:
    - "\"openclaw\"\\s*:\\s*\"(?:\\^|~|=)?2026\\.(?:[12]\\.|3\\.(?:[0-9]|10)\\b)\""
  references:
    - "https://github.com/openclaw/openclaw/security/advisories/GHSA-whf9-3hcx-gq54"
    - "https://nvd.nist.gov/vuln/detail/CVE-2026-32922"
  remediation: >-
    Upgrade to openclaw >= 2026.3.11, invalidate all outstanding device
    tokens, and re-approve node pairings from scratch.
