# Dangerous OpenClaw gateway / config settings. Every rule is tied to a
# published advisory or upstream issue — "local-by-default" is the
# documented OpenClaw posture, so non-loopback binds without auth, insecure
# auth shortcuts, and unbounded trusted-proxy are all known hardening gaps.

- id: OGR-OC-CFG-001
  category: dangerous-config
  severity: high
  title: "OpenClaw gateway bound beyond loopback without explicit auth"
  description: >-
    gateway.bind values of lan/tailnet/custom/0.0.0.0 expose the WebSocket
    and Control UI to other hosts. Without gateway.auth.token or auth.password
    set, any peer that can reach the port gains operator-level access.
  patterns:
    - "\"gateway\\.bind\"\\s*:\\s*\"(?:0\\.0\\.0\\.0|lan|tailnet|custom|auto)\""
    - "\"bind\"\\s*:\\s*\"(?:0\\.0\\.0\\.0|lan|tailnet|custom)\""
  references:
    - "https://github.com/openclaw/openclaw/blob/main/docs/gateway/remote.md"
    - "https://github.com/openclaw/openclaw/issues/16323"
  remediation: >-
    Set gateway.bind back to "loopback" and front the Control UI with
    Tailscale Serve, or set gateway.auth.mode to "token"/"password" with a
    rotated secret before re-enabling the wider bind.

- id: OGR-OC-CFG-002
  category: dangerous-config
  severity: high
  title: "Control UI allowInsecureAuth enabled"
  description: >-
    gateway.controlUi.allowInsecureAuth is a local compatibility toggle only.
    When the gateway also binds beyond loopback, it downgrades auth to
    plaintext and negates the shared-secret posture.
  patterns:
    - "\"allowInsecureAuth\"\\s*:\\s*true"
  references:
    - "https://github.com/openclaw/openclaw/blob/main/docs/web/control-ui.md"
  remediation: >-
    Remove allowInsecureAuth (or set it to false) once you move off localhost
    HTTP compatibility.

- id: OGR-OC-CFG-003
  category: dangerous-config
  severity: high
  title: "gateway.auth.mode trusted-proxy without trustedProxies allowlist"
  description: >-
    Issue #16323 flags that running with auth.mode="trusted-proxy" while
    leaving trustedProxies unset lets any client spoof the identity headers
    the gateway trusts for operator scopes.
  patterns:
    - "\"mode\"\\s*:\\s*\"trusted-proxy\""
  exclude_patterns:
    - "\"trustedProxies\"\\s*:\\s*\\["
  references:
    - "https://github.com/openclaw/openclaw/issues/16323"
    - "https://github.com/openclaw/openclaw/blob/main/docs/gateway/trusted-proxy-auth.md"
  remediation: >-
    Populate gateway.auth.trustedProxies with the exact reverse-proxy IPs or
    CIDRs. Do not run trusted-proxy mode with an empty list.

- id: OGR-OC-CFG-004
  category: dangerous-config
  severity: critical
  title: "Sandbox browser CDP relay bound on 0.0.0.0 (GHSA-525j-hqq2-66r4)"
  description: >-
    The sandbox browser's Chrome DevTools relay historically bound to
    0.0.0.0, exposing a full RCE channel to any host that could reach the
    port. Patched upstream; any config still forcing this bind is vulnerable.
  patterns:
    - "\"sandbox\"[^}]{0,400}\"cdp\"[^}]{0,200}\"0\\.0\\.0\\.0\""
    - "CDP_RELAY_BIND\\s*=\\s*0\\.0\\.0\\.0"
  references:
    - "https://github.com/openclaw/openclaw/security/advisories/GHSA-525j-hqq2-66r4"
  remediation: >-
    Upgrade OpenClaw and remove any override forcing the CDP relay off
    loopback. The fixed default binds to 127.0.0.1 with session-scoped auth.

- id: OGR-OC-CFG-005
  category: dangerous-config
  severity: high
  title: "OpenClaw tool policy default allows unrestricted exec"
  description: >-
    Issue #16323: untrusted senders on messaging channels can reach exec when
    no explicit tools.policy is set. A visible default of an empty or
    wildcard policy should be flagged.
  patterns:
    - "\"tools\"\\s*:\\s*\\{[^}]{0,200}\"policy\"\\s*:\\s*\\{\\s*\\}"
    - "\"tools\\.policy\\.default\"\\s*:\\s*\"(?:allow|\\*)\""
  references:
    - "https://github.com/openclaw/openclaw/issues/16323"
  remediation: >-
    Set tools.policy to an explicit deny-by-default map and name the
    specific senders/groups allowed to invoke each tool.
