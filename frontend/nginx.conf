server {
    listen 80;
    server_name _;  # Accept all hostnames (localhost, IP, domain)
    server_tokens off;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ------------------------------------------------------------------
    # Backend (single upstream as of Phase 3 step 6).
    #
    # All API surfaces — admin (/api/v1), detection (/v1/guardrails*,
    # /v1/scan/, /v1/model/), proxy (/v1/* incl. /v1/chat/completions),
    # gateway (/v1/gateway/*) — are served by the unified FastAPI app
    # on :5000. URL prefixes already disambiguate the surfaces inside
    # the app, so nginx no longer needs split upstreams.
    #
    # Specific prefixes are kept as separate location blocks (rather
    # than one catch-all `location /api/`) so individual proxy_read /
    # proxy_connect timeouts and future per-surface tuning stay
    # straightforward. Each block proxies to the same backend.
    # ------------------------------------------------------------------

    # Detection API — high-concurrency (highest priority via prefix match)
    location ^~ /v1/guardrails {
        proxy_pass http://localhost:5000/v1/guardrails;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
    }

    # Direct Model Access API (passthrough to underlying LLM)
    location ^~ /v1/model/ {
        proxy_pass http://localhost:5000/v1/model/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
    }

    # Content Scan API
    location ^~ /v1/scan/ {
        proxy_pass http://localhost:5000/v1/scan/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
    }

    # Proxy / OpenAI-compatible gateway (catches /v1/chat/completions,
    # /v1/completions, /v1/models, /v1/gateway/*, /beta/litellm_*, etc.)
    # Lower-specificity prefix — matched only if none of the above hit.
    location ^~ /v1/ {
        proxy_pass http://localhost:5000/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
    }

    # Management API
    location ^~ /api/v1/ {
        proxy_pass http://localhost:5000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
    }

    # Legacy /api/ catch-all (kept for backwards compat with older clients)
    location ^~ /api/ {
        proxy_pass http://localhost:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
    }

    # Static resource handling - platform resources
    location ^~ /platform/assets/ {
        alias /usr/share/nginx/html/platform/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Platform SPA application
    location /platform/ {
        alias /usr/share/nginx/html/platform/;
        try_files $uri $uri/ /platform/index.html;
    }

    # Landing page - root path
    location / {
        root /usr/share/nginx/html/landing;
        try_files $uri $uri/ /index.html;
    }

    # Error page
    error_page 404 /index.html;
}
