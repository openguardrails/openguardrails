name: ogr-guard
version: 0.1.0
description: "Secure a Hermes agent + its sandbox through the OpenGuardrails (OGR) protocol. One Runtime + one policy.json enforce across three altitudes — gateway (LLM I/O), agent_hook (pre-tool), and sandbox (real exec) — correlated by guard_id and provenance."
author: "OpenGuardrails"
hooks:
  - pre_tool_call
  - post_tool_call
  - pre_api_request
  - post_api_request
# Optional: ship every GuardEvent to an OpenGuardrails runtime for console
# visibility (Explorer, findings). Local enforcement is fully authoritative
# without these — skip any prompt below (leave blank) to stay local-only.
requires_env:
  - name: OGR_RUNTIME_URL
    description: "OpenGuardrails runtime base URL, e.g. https://your-ogr-instance.example.com (blank = local enforcement only, no console reporting)"
  - name: OGR_API_KEY
    description: "Workspace API key from your OGR console — used as the one-time enrollment bootstrap token"
    secret: true
  - name: OGR_INSTANCE
    description: "Name for this Hermes instance — becomes agent 'hermes-<instance>' in the console. Blank is fine: defaults to hostname (plus your HERMES_HOME folder name, if you use a non-default one — that's Hermes' own way of running separate instances on one machine). Only set this to override that"
